version: '3.8'

services:
  # Python Backend
  backend:
    build:
      context: ./backend
    container_name: alertgate_backend
    ports:
      - "8000:8000"
      - "5140:5140/udp" # Syslog UDP
    env_file:
      - ./backend/.env
    volumes:
      - alertgate_data:/app/data
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
    container_name: alertgate_frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:80/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # SMTP Test-Inbox (Mailpit) – fängt alle E-Mails lokal ab
  mailpit:
    image: axllent/mailpit
    container_name: alertgate_mailpit
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI → http://localhost:8025
    restart: always

volumes:
  alertgate_data:

version: '3.8'

services:
  # Python Backend
  backend:
    build:
      context: ./backend
    container_name: alertgate_backend
    ports:
      - "8000:8000"
      - "5140:5140/udp" # Syslog UDP
    env_file:
      - ./backend/.env
    volumes:
      - alertgate_data:/app/data
    restart: always

  # React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
    container_name: alertgate_frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  alertgate_data:
